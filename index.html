<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Unit 13 Lessons</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>

    <button id="button1">Grow Larger</button>
    <button id="button2">Grow Smaller</button>
    <button id="button3">Animation 3</button>
    <button id="button4">Animation 4</button>

    <div class="avatar">
      <img
        src="https://www.khanacademy.org/images/avatars/svg/aqualine-sapling.svg"
        width="150"
      />
      <h1>Aqualine</h1>
    </div>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.4/jquery.min.js"></script>
    <script>
    
      // ======================== Button #1
      $("#button1").click(function () {
        $(".avatar img").animate({width: "300px"});
        $(".avatar h1").animate({fontSize: "6em"});
      });

      // ======================== Button #2
      $("#button2").click(function () {
        $(".avatar img").animate({width: "150px"});
        $(".avatar h1").animate({fontSize: "3em"});
      });

      // ======================== Button #3
      $("#button3").click(function () {
        $(".avatar img").animate({borderRadius: "50px"});
        $(".avatar h1").animate({letterSpacing: "10px"});
      });

       // ======================== Button #4
      $("#button4").click(function () {
        $(".avatar img").animate({height: "100px"});
        $(".avatar h1").animate({fontSize: "2em"});
      });
    
    
    
    </script>
  </body>
</html>
